<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sancav | Ultra Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f1a; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass { background: rgba(23, 32, 53, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .sancav-accent { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        textarea { background: #1a2236 !important; border: 1px solid #2d3748 !important; color: #94a3b8 !important; }
        textarea:focus { border-color: #6366f1 !important; box-shadow: 0 0 10px rgba(99, 102, 241, 0.2); outline: none; }
        .user-card { transition: all 0.2s; border: 1px solid rgba(255,255,255,0.05); }
        .user-card:hover { transform: translateY(-2px); background: rgba(99, 102, 241, 0.1); border-color: #6366f1; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4">

    <div class="w-full max-w-4xl glass mt-6 p-6 md:p-10 rounded-3xl shadow-2xl">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-tighter text-white uppercase">Sancav Analiz</h1>
            <div class="h-1 w-20 sancav-accent mx-auto mt-2 rounded-full"></div>
            <p class="text-gray-500 text-xs mt-4 leading-relaxed">
                <span class="text-indigo-400">HIZLI YÖNTEM:</span> Instagram'da listeyi aç, <br class="md:hidden"> 
                tüm isimleri rastgele kopyala ve buraya yapıştır. <br>
                Sistem isimleri otomatik ayıklar.
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-indigo-400">1. Takip Ettiklerin</label>
                <textarea id="following" placeholder="Listeyi buraya boca et..." class="w-full h-48 p-4 rounded-2xl text-sm"></textarea>
                <div class="text-[10px] text-gray-500 text-right">Bulunan: <span id="countFollowing" class="text-white">0</span></div>
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold uppercase tracking-widest text-indigo-400">2. Takipçilerin</label>
                <textarea id="followers" placeholder="Listeyi buraya boca et..." class="w-full h-48 p-4 rounded-2xl text-sm"></textarea>
                <div class="text-[10px] text-gray-500 text-right">Bulunan: <span id="countFollowers" class="text-white">0</span></div>
            </div>
        </div>

        <button onclick="smartAnalyze()" class="w-full mt-8 py-5 rounded-2xl sancav-accent font-black text-white shadow-lg hover:brightness-110 active:scale-[0.98] transition-all uppercase tracking-widest">
            Analizi Başlat
        </button>

        <div id="resultArea" class="hidden mt-12">
            <div class="flex items-center justify-between mb-6 border-b border-slate-800 pb-4">
                <h2 class="text-lg font-bold text-white">Seni Takip Etmeyenler</h2>
                <span id="badCount" class="bg-red-500/10 text-red-500 px-3 py-1 rounded-lg text-xs font-bold border border-red-500/20">0 Kişi</span>
            </div>
            <div id="results" class="grid grid-cols-2 md:grid-cols-3 gap-3"></div>
        </div>
    </div>

    <footer class="mt-auto py-10 text-[10px] text-gray-600 tracking-[0.5em] uppercase font-bold">
        created by sancav
    </footer>

    <script>
        function extractUsernames(text) {
            // Sadece kullanıcı adlarını yakalayan gelişmiş Regex
            // HTML içindeki verileri veya düz metni temizler
            const regex = /([a-z0-9._]{3,30})/gi;
            const matches = text.match(regex) || [];
            
            // Gereksiz kelimeleri (Instagram buton isimleri vb.) filtrele
            const forbidden = ['verified', 'follow', 'following', 'takip', 'et', 'profil', 'resmi', 'post', 'followers', 'posts'];
            return [...new Set(matches.map(m => m.toLowerCase()))]
                   .filter(m => m.length > 2 && !forbidden.includes(m) && isNaN(m));
        }

        function smartAnalyze() {
            const followingText = document.getElementById('following').value;
            const followersText = document.getElementById('followers').value;

            const followingList = extractUsernames(followingText);
            const followersList = extractUsernames(followersText);

            document.getElementById('countFollowing').innerText = followingList.length;
            document.getElementById('countFollowers').innerText = followersList.length;

            const nonBack = followingList.filter(user => !followersList.includes(user));

            const resultArea = document.getElementById('resultArea');
            const resultsDiv = document.getElementById('results');
            const badCount = document.getElementById('badCount');

            resultsDiv.innerHTML = "";
            badCount.innerText = `${nonBack.length} Kişi`;

            if (nonBack.length > 0) {
                resultArea.classList.remove('hidden');
                nonBack.forEach(user => {
                    const card = document.createElement('div');
                    card.className = "user-card bg-slate-900/50 p-3 rounded-xl flex items-center justify-between";
                    card.innerHTML = `
                        <span class="text-xs font-medium text-slate-300">@${user}</span>
                        <a href="https://instagram.com/${user}" target="_blank" class="text-[9px] text-indigo-400 border border-indigo-400/30 px-2 py-1 rounded hover:bg-indigo-400 hover:text-white transition">GİT</a>
                    `;
                    resultsDiv.appendChild(card);
                });
                resultArea.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Herkes seni takip ediyor veya veri girişi hatalı.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sancav | Hızlı Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #05070a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.03); }
        .sancav-btn { background: linear-gradient(135deg, #4338ca 0%, #7e22ce 100%); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sancav-btn:hover { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); transform: translateY(-1px); }
        textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #94a3b8 !important; resize: none; }
        textarea:focus { border-color: #4f46e5 !important; outline: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center justify-center p-4">

    <div class="w-full max-w-3xl glass p-8 md:p-12 rounded-[2rem] shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-black tracking-tighter text-white uppercase italic">Sancav Analiz</h1>
            <p class="text-gray-500 text-[10px] mt-2 tracking-[0.3em] uppercase">Hızlı • Güvenli • Otomatik Ayıklama</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">Takip Ettiklerin</label>
                    <span id="countFollowing" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-white font-mono">0</span>
                </div>
                <textarea id="following" oninput="autoProcess()" placeholder="" class="w-full h-40 p-5 rounded-2xl text-sm leading-relaxed"></textarea>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-indigo-400">Takipçilerin</label>
                    <span id="countFollowers" class="text-[10px] bg-slate-800 px-2 py-0.5 rounded text-white font-mono">0</span>
                </div>
                <textarea id="followers" oninput="autoProcess()" placeholder="" class="w-full h-40 p-5 rounded-2xl text-sm leading-relaxed"></textarea>
            </div>
        </div>

        <button onclick="smartAnalyze()" class="w-full mt-10 py-5 rounded-2xl sancav-btn font-black text-white shadow-lg uppercase tracking-widest text-sm">
            Analizi Başlat
        </button>

        <div id="resultArea" class="hidden mt-12 animate-pulse-once">
            <div class="flex items-center justify-between mb-8 border-b border-slate-800 pb-4">
                <h2 class="text-lg font-bold text-white uppercase italic">Ekenler Listesi</h2>
                <span id="badCount" class="text-red-500 text-xs font-black tracking-tighter">0 KİŞİ</span>
            </div>
            <div id="results" class="grid grid-cols-2 sm:grid-cols-3 gap-3"></div>
        </div>
    </div>

    <footer class="mt-12 mb-6 text-[10px] text-gray-700 tracking-[0.6em] uppercase font-bold">
        created by sancav
    </footer>

    <script>
        // Metinden kullanıcı adlarını süzüp temizleyen çekirdek fonksiyon
        function extractUsernames(text) {
            if (!text) return [];
            // Instagram sayfasından kopyalanan her şeyi ayıklar
            const regex = /([a-z0-9._]{3,30})/gi;
            const matches = text.match(regex) || [];
            
            const forbidden = ['verified', 'follow', 'following', 'takip', 'et', 'profil', 'resmi', 'post', 'followers', 'posts', 'ayarları', 'mesaj', 'hikaye'];
            return [...new Set(matches.map(m => m.toLowerCase()))]
                   .filter(m => m.length > 2 && !forbidden.includes(m) && isNaN(m));
        }

        // Kullanıcı yapıştırdığı anda sayıyı otomatik günceller
        function autoProcess() {
            const followingList = extractUsernames(document.getElementById('following').value);
            const followersList = extractUsernames(document.getElementById('followers').value);
            
            document.getElementById('countFollowing').innerText = followingList.length;
            document.getElementById('countFollowers').innerText = followersList.length;
        }

        function smartAnalyze() {
            const followingList = extractUsernames(document.getElementById('following').value);
            const followersList = extractUsernames(document.getElementById('followers').value);

            if (followingList.length === 0 || followersList.length === 0) {
                alert("Önce listeleri yapıştır aga.");
                return;
            }

            const nonBack = followingList.filter(user => !followersList.includes(user));

            const resultArea = document.getElementById('resultArea');
            const resultsDiv = document.getElementById('results');
            const badCount = document.getElementById('badCount');

            resultsDiv.innerHTML = "";
            badCount.innerText = `${nonBack.length} KİŞİ`;
            resultArea.classList.remove('hidden');

            nonBack.forEach(user => {
                const card = document.createElement('div');
                card.className = "bg-[#0a101f] border border-slate-800 p-3 rounded-xl flex items-center justify-between group hover:border-indigo-500 transition-all";
                card.innerHTML = `
                    <span class="text-[11px] font-medium text-slate-400">@${user}</span>
                    <a href="https://instagram.com/${user}" target="_blank" class="text-[9px] text-indigo-500 font-bold opacity-0 group-hover:opacity-100 transition-opacity uppercase tracking-tighter">GİT</a>
                `;
                resultsDiv.appendChild(card);
            });

            resultArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

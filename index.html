<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sancav | Kaçak Avcısı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030712; color: #f9fafb; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.05); }
        .sancav-gradient { background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%); }
        textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #cbd5e1 !important; resize: none; transition: 0.3s; }
        textarea:focus { border-color: #6366f1 !important; outline: none; box-shadow: 0 0 15px rgba(99, 102, 241, 0.15); }
        .user-card { animation: slideUp 0.3s ease-out forwards; border: 1px solid rgba(255,255,255,0.03); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4 md:p-10">

    <div class="w-full max-w-4xl glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl mt-4">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase text-white bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
                Sancav Analiz
            </h1>
            <p class="text-gray-500 text-[10px] mt-3 tracking-[0.4em] uppercase font-bold">Hızlı Analiz • Kaçak Avcısı</p>
        </header>

        <div class="bg-indigo-500/5 border border-indigo-500/10 p-5 rounded-2xl mb-10 text-center">
            <p class="text-[10px] text-gray-400 leading-relaxed uppercase tracking-widest font-bold">
                Instagram'da listeyi kopyala ve aşağıya yapıştır. <br> 
                <span class="text-indigo-400 italic">Sadece seni takip etmeyenler yakalanacaktır.</span>
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-3">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-indigo-500">Takip Ettiklerin (Following)</label>
                    <span id="countFollowing" class="text-[10px] font-mono text-gray-400 bg-slate-900 px-2 py-0.5 rounded">0</span>
                </div>
                <textarea id="following" oninput="updateCounts()" placeholder="Buraya kopyala..." class="w-full h-56 p-5 rounded-2xl text-xs"></textarea>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-indigo-500">Takipçilerin (Followers)</label>
                    <span id="countFollowers" class="text-[10px] font-mono text-gray-400 bg-slate-900 px-2 py-0.5 rounded">0</span>
                </div>
                <textarea id="followers" oninput="updateCounts()" placeholder="Buraya kopyala..." class="w-full h-56 p-5 rounded-2xl text-xs"></textarea>
            </div>
        </div>

        <button onclick="startSancavHunt()" class="w-full mt-10 py-6 rounded-2xl sancav-gradient font-black text-white text-sm uppercase tracking-[0.3em] shadow-2xl active:scale-95 transition-all hover:brightness-110">
            KAÇAKLARI BUL
        </button>

        <div id="resultArea" class="hidden mt-16 border-t border-slate-800 pt-10">
            <div class="flex justify-between items-center mb-8 px-2">
                <h2 class="text-xl font-black italic uppercase tracking-tighter text-white">Seni Geri Takip Etmeyenler</h2>
                <span id="badCount" class="bg-red-500/10 text-red-500 px-4 py-1.5 rounded-full text-xs font-black border border-red-500/20">0 KİŞİ</span>
            </div>
            <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <footer class="mt-16 mb-10 text-[9px] text-gray-700 tracking-[0.8em] uppercase font-black italic">
        created by sancav
    </footer>

    <script>
        // Akıllı Ayıştırıcı - Metin yığınından kullanıcı adlarını filtreler
        function extractUsernames(text) {
            if (!text) return [];
            
            // Regex: Sadece Instagram kullanıcı adlarını (3-30 karakter) yakalar
            const regex = /([a-z0-9._]{3,30})/gi;
            const matches = text.match(regex) || [];
            
            // Çöp Kelimeler (Bunlar kullanıcı adı değil, sistem mesajlarıdır)
            const garbage = [
                'verified', 'follow', 'following', 'takip', 'et', 'profil', 'resmi', 
                'post', 'followers', 'posts', 'message', 'suggested', 'kapat', 
                'ayarlar', 'hikaye', 'beğen', 'yanıtla', 'gönder', 'paylaş', 'kaydet',
                'tümü', 'gör', 'kullanıcısının', 'fotoğrafı', 'videosu', 'onaylı',
                'hesap', 'paylaşımı', 'görüntüle', 'ara', 'keşfet', 'profiline'
            ];
            
            return [...new Set(matches.map(m => m.toLowerCase()))]
                   .filter(m => m.length > 2 && !garbage.includes(m) && isNaN(m));
        }

        // Sayıları anlık günceller
        function updateCounts() {
            const following = extractUsernames(document.getElementById('following').value);
            const followers = extractUsernames(document.getElementById('followers').value);
            
            document.getElementById('countFollowing').innerText = following.length;
            document.getElementById('countFollowers').innerText = followers.length;
        }

        function startSancavHunt() {
            const following = extractUsernames(document.getElementById('following').value);
            const followers = extractUsernames(document.getElementById('followers').value);

            if (following.length === 0 || followers.length === 0) {
                alert("Aga önce listeleri yapıştırman lazım.");
                return;
            }

            // MANTIK: Takip ettiklerim arasında olup beni takip etmeyenleri süz (Kaçaklar)
            const losers = following.filter(u => !followers.includes(u));
            
            const resultsDiv = document.getElementById('results');
            const resultArea = document.getElementById('resultArea');
            const badCountSpan = document.getElementById('badCount');

            resultsDiv.innerHTML = "";
            badCountSpan.innerText = losers.length + " KİŞİ";
            resultArea.classList.remove('hidden');

            if (losers.length === 0) {
                resultsDiv.innerHTML = "<p class='col-span-full text-center text-gray-500 text-xs italic'>Herkes seni geri takip ediyor aga, kralsın.</p>";
            } else {
                losers.forEach(user => {
                    const card = document.createElement('div');
                    card.className = "user-card bg-[#0d1321] p-4 rounded-2xl flex flex-col items-center justify-center border border-slate-800/40 group hover:border-indigo-500 transition-all";
                    card.innerHTML = `
                        <span class="text-[10px] font-bold text-slate-300 group-hover:text-white truncate w-full text-center">@${user}</span>
                        <a href="https://instagram.com/${user}" target="_blank" class="text-[8px] mt-3 text-indigo-400 border border-indigo-400/30 px-3 py-1 rounded-lg uppercase font-black hover:bg-indigo-500 hover:text-white transition-all">PROFİL</a>
                    `;
                    resultsDiv.appendChild(card);
                });
            }

            resultArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

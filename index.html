<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sancav | Instagram Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .sancav-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        textarea { transition: all 0.3s; border: 1px solid #334155; }
        textarea:focus { border-color: #818cf8; outline: none; box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); }
        .result-card { animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4 md:p-8">

    <div class="w-full max-w-5xl glass p-6 md:p-10 rounded-3xl shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                Sancav Analiz
            </h1>
            <p class="text-gray-400 mt-2 text-sm md:text-base">Güvenli, hızlı ve reklamsız takipçi kontrolü.</p>
        </header>

        <div class="mb-10 p-6 border-2 border-dashed border-slate-700 rounded-2xl text-center hover:border-indigo-500 transition-colors">
            <p class="text-sm text-gray-300 mb-4 font-medium">Instagram'dan indirdiğin JSON dosyalarını buraya seçebilirsin:</p>
            <div class="flex flex-wrap justify-center gap-4">
                <input type="file" id="fileFollowing" class="hidden" accept=".json">
                <button onclick="document.getElementById('fileFollowing').click()" class="px-4 py-2 bg-slate-800 rounded-lg text-xs hover:bg-slate-700">Following.json Yükle</button>
                
                <input type="file" id="fileFollowers" class="hidden" accept=".json">
                <button onclick="document.getElementById('fileFollowers').click()" class="px-4 py-2 bg-slate-800 rounded-lg text-xs hover:bg-slate-700">Followers.json Yükle</button>
            </div>
            <p id="fileStatus" class="mt-3 text-xs text-indigo-400 font-mono"></p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="flex flex-col">
                <label class="mb-3 text-sm font-semibold text-indigo-300 flex justify-between">
                    <span>Takip Ettiklerin</span>
                    <span class="text-gray-500 font-normal">Sayı: <b id="countFollowing">0</b></span>
                </label>
                <textarea id="following" placeholder="Kullanıcı adlarını buraya yapıştır..." class="w-full h-56 p-4 rounded-2xl bg-slate-900 text-sm leading-relaxed"></textarea>
            </div>
            
            <div class="flex flex-col">
                <label class="mb-3 text-sm font-semibold text-indigo-300 flex justify-between">
                    <span>Takipçilerin</span>
                    <span class="text-gray-500 font-normal">Sayı: <b id="countFollowers">0</b></span>
                </label>
                <textarea id="followers" placeholder="Kullanıcı adlarını buraya yapıştır..." class="w-full h-56 p-4 rounded-2xl bg-slate-900 text-sm leading-relaxed"></textarea>
            </div>
        </div>

        <button onclick="analyze()" class="w-full mt-10 py-4 rounded-2xl sancav-gradient font-bold text-white shadow-xl hover:opacity-90 transition-opacity">
            Analizi Başlat
        </button>

        <div id="resultArea" class="hidden mt-12 animate-in">
            <div class="flex items-center justify-between mb-6 border-b border-slate-700 pb-4">
                <h2 class="text-2xl font-bold">Sonuçlar</h2>
                <span id="badCount" class="bg-red-500/20 text-red-400 px-4 py-1 rounded-full text-sm font-bold">0 Kişi Takibi Bırakmış</span>
            </div>
            <div id="results" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                </div>
        </div>
    </div>

    <footer class="mt-auto py-10 text-gray-500 text-xs tracking-[0.3em] uppercase opacity-60">
        created by sancav
    </footer>

    <script>
        // Dosya okuma işlemleri
        document.getElementById('fileFollowing').addEventListener('change', (e) => handleFile(e, 'following'));
        document.getElementById('fileFollowers').addEventListener('change', (e) => handleFile(e, 'followers'));

        function handleFile(event, type) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    let list = [];
                    // Instagram JSON yapısına göre parse etme
                    if (type === 'following') {
                        list = data.relationships_following.map(i => i.string_list_data[0].value);
                    } else {
                        list = data.map(i => i.string_list_data[0].value);
                    }
                    document.getElementById(type).value = list.join('\n');
                    document.getElementById('fileStatus').innerText = type.toUpperCase() + " listesi yüklendi.";
                } catch (err) {
                    alert("JSON dosyası okunamadı. Lütfen Instagram'dan gelen orijinal dosyayı seçin.");
                }
            };
            reader.readAsText(file);
        }

        function analyze() {
            const rawFollowing = document.getElementById('following').value.toLowerCase();
            const rawFollowers = document.getElementById('followers').value.toLowerCase();

            // Regex ile sadece kullanıcı adlarını ayıkla (boşlukları, virgülleri temizle)
            const followingArr = [...new Set(rawFollowing.split(/[\n, ]+/).filter(i => i.trim() !== ""))];
            const followersArr = [...new Set(rawFollowers.split(/[\n, ]+/).filter(i => i.trim() !== ""))];

            document.getElementById('countFollowing').innerText = followingArr.length;
            document.getElementById('countFollowers').innerText = followersArr.length;

            const nonBack = followingArr.filter(u => !followersArr.includes(u));

            const resultArea = document.getElementById('resultArea');
            const resultsDiv = document.getElementById('results');
            const badCount = document.getElementById('badCount');

            resultsDiv.innerHTML = "";
            badCount.innerText = `${nonBack.length} Kişi Geri Takip Etmiyor`;

            if (nonBack.length > 0) {
                resultArea.classList.remove('hidden');
                nonBack.forEach(user => {
                    const card = document.createElement('div');
                    card.className = "result-card bg-slate-800/50 p-4 rounded-xl border border-slate-700 flex justify-between items-center";
                    card.innerHTML = `
                        <span class="font-mono text-indigo-300 italic">@${user}</span>
                        <a href="https://instagram.com/${user}" target="_blank" class="text-[10px] bg-slate-700 px-2 py-1 rounded hover:bg-indigo-600 transition">Profil</a>
                    `;
                    resultsDiv.appendChild(card);
                });
                resultArea.scrollIntoView({ behavior: 'smooth' });
            } else {
                alert("Mükemmel! Herkes seni geri takip ediyor.");
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sancav | Hızlı Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #05070a; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(17, 24, 39, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .sancav-btn { background: linear-gradient(135deg, #4338ca 0%, #7e22ce 100%); transition: 0.3s; }
        .sancav-btn:hover { box-shadow: 0 0 20px rgba(99, 102, 241, 0.4); transform: translateY(-1px); }
        textarea { background: #0f172a !important; border: 1px solid #1e293b !important; color: #94a3b8 !important; resize: none; transition: 0.3s; }
        textarea:focus { border-color: #4f46e5 !important; outline: none; box-shadow: 0 0 15px rgba(79, 70, 229, 0.1); }
        .user-card { animation: slideUp 0.3s ease-out forwards; border: 1px solid rgba(255,255,255,0.03); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-6">

    <div class="w-full max-w-4xl glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl mt-10">
        <header class="text-center mb-10">
            <h1 class="text-5xl font-black italic tracking-tighter uppercase text-white bg-gradient-to-r from-indigo-400 to-purple-500 bg-clip-text text-transparent">
                Sancav Analiz
            </h1>
            <p class="text-gray-500 text-[10px] mt-3 tracking-[0.4em] uppercase font-bold">Strateji • Hız • Sıfır Bekleme</p>
        </header>

        <div class="bg-indigo-500/5 border border-indigo-500/20 p-5 rounded-2xl mb-10 text-center">
            <p class="text-[11px] text-indigo-400 font-black uppercase tracking-widest mb-2">HIZLI TALİMAT</p>
            <p class="text-[10px] text-gray-400 leading-relaxed">
                <span class="text-white font-bold">Mobil:</span> Tarayıcıdan Instagram'a gir, listeyi komple seçip buraya yapıştır.<br>
                <span class="text-white font-bold">PC:</span> Listeyi aç, <code class="bg-slate-800 px-1 rounded text-indigo-300">Ctrl+A</code> ve <code class="bg-slate-800 px-1 rounded text-indigo-300">Ctrl+C</code> yapıp buraya boca et.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-3">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-indigo-500">1. Takip Ettiklerin</label>
                    <span id="countFollowing" class="text-[10px] font-mono text-gray-500 bg-slate-900 px-2 py-0.5 rounded">0</span>
                </div>
                <textarea id="following" oninput="autoProcess()" placeholder="Kopyaladığın her şeyi buraya yapıştır..." class="w-full h-56 p-5 rounded-2xl text-xs"></textarea>
            </div>

            <div class="space-y-3">
                <div class="flex justify-between items-center px-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-indigo-500">2. Takipçilerin</label>
                    <span id="countFollowers" class="text-[10px] font-mono text-gray-500 bg-slate-900 px-2 py-0.5 rounded">0</span>
                </div>
                <textarea id="followers" oninput="autoProcess()" placeholder="İkinci listeyi buraya yapıştır..." class="w-full h-56 p-5 rounded-2xl text-xs"></textarea>
            </div>
        </div>

        <button onclick="runSancavAnalysis()" class="w-full mt-10 py-6 rounded-2xl sancav-btn font-black text-white uppercase tracking-[0.2em] text-sm shadow-2xl active:scale-95 transition-all">
            Analizi Başlat
        </button>

        <div id="resultArea" class="hidden mt-16 border-t border-slate-800 pt-10">
            <div class="flex justify-between items-center mb-8 px-2">
                <h2 class="text-xl font-black italic uppercase tracking-tighter text-white">Seni Ekenler Listesi</h2>
                <span id="badCount" class="bg-red-500/10 text-red-500 px-4 py-1.5 rounded-full text-xs font-black border border-red-500/20 tracking-tighter">0 KİŞİ</span>
            </div>
            <div id="results" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
        </div>
    </div>

    <footer class="mt-16 mb-10 text-[10px] text-gray-700 tracking-[0.6em] uppercase font-black italic">
        created by sancav
    </footer>

    <script>
        // Akıllı Ayıştırıcı - Karışık veriden sadece kullanıcı adlarını çeker
        function extractUsernames(text) {
            if (!text) return [];
            
            // Regex: Kullanıcı adı formatına uyanları yakalar
            const regex = /([a-z0-9._]{3,30})/gi;
            const matches = text.match(regex) || [];
            
            // Instagram'ın sistem kelimeleri (Bunlar kullanıcı adı değil)
            const garbage = [
                'verified', 'follow', 'following', 'takip', 'et', 'profil', 'resmi', 
                'post', 'followers', 'posts', 'message', 'suggested', 'kapat', 
                'ayarlar', 'hikaye', 'beğen', 'yanıtla', 'gönder', 'paylaş', 'kaydet',
                'tümü', 'gör', 'kullanıcısının', 'fotoğrafı', 'videosu'
            ];
            
            return [...new Set(matches.map(m => m.toLowerCase()))]
                   .filter(m => m.length > 2 && !garbage.includes(m) && isNaN(m));
        }

        // Giriş yapıldıkça sayıları otomatik güncelle
        function autoProcess() {
            const following = extractUsernames(document.getElementById('following').value);
            const followers = extractUsernames(document.getElementById('followers').value);
            
            document.getElementById('countFollowing').innerText = following.length;
            document.getElementById('countFollowers').innerText = followers.length;
        }

        function runSancavAnalysis() {
            const following = extractUsernames(document.getElementById('following').value);
            const followers = extractUsernames(document.getElementById('followers').value);

            if (following.length === 0 || followers.length === 0) {
                alert("Aga önce her iki listeyi de yapıştırmalısın.");
                return;
            }

            // Takip edip de takipçiler listesinde olmayanları bul
            const losers = following.filter(u => !followers.includes(u));
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = "";
            document.getElementById('badCount').innerText = losers.length + " KİŞİ";
            document.getElementById('resultArea').classList.remove('hidden');

            losers.forEach(user => {
                const card = document.createElement('div');
                card.className = "user-card bg-[#0d1321] p-4 rounded-2xl flex flex-col items-center justify-center border border-slate-800/40 group hover:border-indigo-500 transition-all";
                card.innerHTML = `
                    <span class="text-[11px] font-bold text-slate-300 group-hover:text-white">@${user}</span>
                    <a href="https://instagram.com/${user}" target="_blank" class="text-[8px] mt-3 text-indigo-400 border border-indigo-400/30 px-3 py-1 rounded-lg uppercase font-black hover:bg-indigo-500 hover:text-white transition-all">GİT</a>
                `;
                resultsDiv.appendChild(card);
            });

            // Sonuçlara yumuşak kaydır
            document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>

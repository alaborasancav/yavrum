<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sancav | Takipçi Analiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        textarea { resize: none; transition: all 0.3s ease; }
        textarea:focus { border-color: #6366f1; outline: none; box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        .btn-sancav { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); transition: transform 0.2s; }
        .btn-sancav:active { transform: scale(0.95); }
    </style>
</head>
<body class="flex flex-col min-h-screen items-center p-4 md:p-10">

    <div class="w-full max-w-4xl glass p-6 md:p-8 rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-bold text-center mb-2 bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
            Instagram Analiz
        </h1>
        <p class="text-center text-gray-400 text-sm mb-8">Takip ettiğin ama seni geri takip etmeyenleri anında bul.</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Takip Ettiklerin (Following)</label>
                <textarea id="following" placeholder="Kullanıcı adlarını yapıştır..." class="w-full h-48 p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm"></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Takipçilerin (Followers)</label>
                <textarea id="followers" placeholder="Kullanıcı adlarını yapıştır..." class="w-full h-48 p-4 rounded-xl bg-slate-900 border border-slate-700 text-sm"></textarea>
            </div>
        </div>

        <button onclick="analyze()" class="w-full mt-8 py-4 rounded-xl btn-sancav font-bold text-lg shadow-lg">
            Analiz Et
        </button>

        <div id="resultArea" class="hidden mt-10">
            <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2">Geri Takip Etmeyenler</h2>
            <div id="results" class="grid grid-cols-2 md:grid-cols-3 gap-3">
                </div>
        </div>
    </div>

    <footer class="mt-auto py-8 text-gray-500 tracking-widest text-sm uppercase">
        created by sancav
    </footer>

    <script>
        function analyze() {
            const followingInput = document.getElementById('following').value.toLowerCase().split(/\n| /).filter(item => item.trim() !== "");
            const followersInput = document.getElementById('followers').value.toLowerCase().split(/\n| /).filter(item => item.trim() !== "");
            
            // Küme farkı hesabı: Following - Followers
            const nonFollowers = followingInput.filter(user => !followersInput.includes(user));
            
            const resultArea = document.getElementById('resultArea');
            const resultsDiv = document.getElementById('results');
            
            resultsDiv.innerHTML = "";
            
            if (nonFollowers.length > 0) {
                resultArea.classList.remove('hidden');
                nonFollowers.forEach(user => {
                    const div = document.createElement('div');
                    div.className = "bg-slate-800 p-3 rounded-lg text-center text-indigo-300 border border-slate-700 text-sm font-mono truncate";
                    div.textContent = "@" + user;
                    resultsDiv.appendChild(div);
                });
            } else {
                alert("Herkes seni takip ediyor veya listeler hatalı.");
            }
        }
    </script>
</body>
</html>
